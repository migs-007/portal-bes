
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal BES - JEPP 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #1a252f;
            --animal: #c0392b; 
            --lixo: #d35400;   
            --bg-dark: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            height: 100%; width: 100%; 
            font-family: sans-serif; 
            background: var(--primary);
            overflow: hidden; 
        }

        /* TELA INICIAL */
        #menu-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            position: relative; color: white; text-align: center;
        }

        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Fundo bem escuro */
            z-index: -1;
        }

        .menu-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; width: 90%; max-width: 1100px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 30px;
            border-radius: 20px; cursor: pointer;
            width: 280px; transition: 0.3s;
        }
        .menu-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.2); }

        /* TELA DO MAPA */
        #map-screen { display: none; height: 100vh; flex-direction: column; }
        header {
            background: #111; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 1px solid #333; color: white;
        }

        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 350px; background: #1e1e1e; padding: 20px; color: #ccc; }
        #map { flex: 1; height: 100%; background: #222; }

        .btn-reg {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            color: white; font-weight: bold; cursor: pointer; margin-bottom: 20px;
        }

        /* RESPONSIVIDADE CELULAR */
        @media (max-width: 768px) {
            body, html { overflow: auto; }
            main { flex-direction: column; }
            #map { height: 60vh; width: 100%; }
            #sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="overlay"></div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Portal Comunitário BES</h1>
        <p style="margin-bottom: 40px; color: #aaa;">JEPP 2026 • 8º Ano</p>

        <div class="menu-container">
            <div class="menu-card" onclick="abrirMapa('SOS Animais', 'var(--animal)')">
                <span style="font-size: 50px;">🐾</span>
                <h3>SOS Animais</h3>
                <p style="font-size: 0.8rem; color: #bbb;">Cachorros, Gatos e Outros</p>
            </div>
            <div class="menu-card" onclick="abrirMapa('Eco-Ponto', 'var(--lixo)')">
                <span style="font-size: 50px;">🗑️</span>
                <h3>Lixo e Entulho</h3>
                <p style="font-size: 0.8rem; color: #bbb;">Pontos de Descarte Regular</p>
            </div>
        </div>
    </div>

    <div id="map-screen">
        <header>
            <button onclick="location.reload()" style="background:none; border:1px solid #555; color:white; padding:8px 15px; cursor:pointer;">Voltar</button>
            <h2 id="map-title">MAPA</h2>
            <div></div>
        </header>
        <main>
            <div id="map"></div>
            <section id="sidebar">
                <button id="btn-reg" class="btn-reg" onclick="registrar()">+ REGISTRAR</button>
                <div id="lista"></div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        function abrirMapa(titulo, cor) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('map-screen').style.display = 'flex';
            document.getElementById('map-title').innerText = titulo;
            document.getElementById('btn-reg').style.backgroundColor = cor;
            if (!map) {
                map = L.map('map').setView([-21.9932, -48.3906], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            setTimeout(() => { map.invalidateSize(); }, 200);
        }

        function registrar() {
            const desc = prompt("O que deseja registrar?");
            if(desc) {
                L.marker(map.getCenter()).addTo(map).bindPopup(desc).openPopup();
                const item = document.createElement('div');
                item.style.padding = "10px; border-bottom: 1px solid #333";
                item.innerHTML = `<strong>Novo:</strong> ${desc}`;
                document.getElementById('lista').prepend(item);
            }
        }
    </script>
</body>
</html>
