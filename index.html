
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal BES - JEPP 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #1a252f;
            --animal: #c0392b; 
            --lixo: #d35400;   
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            height: 100%; width: 100%; 
            font-family: sans-serif; 
            background: var(--primary);
            overflow: hidden; 
        }

        /* TELA INICIAL */
        #menu-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            position: relative; color: white; text-align: center;
        }

        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: -1;
        }

        .menu-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; width: 90%; max-width: 1100px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 30px;
            border-radius: 20px; cursor: pointer;
            width: 280px; transition: 0.3s;
        }

        /* TELA DO MAPA */
        #map-screen { display: none; height: 100vh; flex-direction: column; }
        
        header {
            background: #111; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 1px solid #333; color: white;
            z-index: 1000;
        }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        #sidebar { width: 350px; background: #1e1e1e; padding: 20px; color: #ccc; z-index: 10; }
        
        /* CONTAINER DO MAPA E MIRA */
        #map-container { flex: 1; position: relative; height: 100%; }
        #map { height: 100%; width: 100%; background: #222; }

        /* MIRA DE MARCAÇÃO (CENTRO DO MAPA) */
        .centro-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            pointer-events: none; /* Não bloqueia o toque no mapa */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mira-ponto {
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(255,0,0,0.8);
        }

        .mira-linha-v { width: 2px; height: 30px; background: rgba(255,255,255,0.4); position: absolute; }
        .mira-linha-h { width: 30px; height: 2px; background: rgba(255,255,255,0.4); position: absolute; }

        .btn-reg {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            color: white; font-weight: bold; cursor: pointer; margin-bottom: 20px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            body, html { overflow: auto; }
            main { flex-direction: column; }
            #map-container { height: 60vh; min-height: 350px; }
            #sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="overlay"></div>
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Portal Comunitário BES</h1>
        <p style="margin-bottom: 40px; color: #888;">JEPP 2026 • 8º Ano</p>

        <div class="menu-container">
            <div class="menu-card" onclick="abrirMapa('SOS Animais', 'var(--animal)')">
                <span style="font-size: 50px;">🐾</span>
                <h3>SOS Animais</h3>
                <p style="font-size: 0.8rem; color: #888;">Cachorros, Gatos e Outros</p>
            </div>
            <div class="menu-card" onclick="abrirMapa('Eco-Ponto', 'var(--lixo)')">
                <span style="font-size: 50px;">🗑️</span>
                <h3>Lixo e Entulho</h3>
                <p style="font-size: 0.8rem; color: #888;">Pontos de Descarte Regular</p>
            </div>
        </div>
    </div>

    <div id="map-screen">
        <header>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:white; padding:8px 15px; cursor:pointer; border-radius: 5px;">Sair</button>
            <h2 id="map-title" style="font-size: 1.1rem;">MAPA</h2>
            <div style="width: 50px;"></div>
        </header>
        <main>
            <div id="map-container">
                <div id="map"></div>
                <!-- Mira Visual Fixa -->
                <div class="centro-marker">
                    <div class="mira-linha-v"></div>
                    <div class="mira-linha-h"></div>
                    <div class="mira-ponto"></div>
                </div>
            </div>
            <section id="sidebar">
                <p style="font-size: 0.85rem; margin-bottom: 12px; color: #aaa; text-align: center;">
                    Posicione o ponto vermelho no local exato:
                </p>
                <button id="btn-reg" class="btn-reg" onclick="registrar()">+ REGISTRAR NO LOCAL</button>
                <div id="lista"></div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        function abrirMapa(titulo, cor) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('map-screen').style.display = 'flex';
            document.getElementById('map-title').innerText = titulo.toUpperCase();
            document.getElementById('btn-reg').style.backgroundColor = cor;
            
            if (!map) {
                // Foco em Boa Esperança do Sul
                map = L.map('map').setView([-21.9932, -48.3906], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        function registrar() {
            const desc = prompt("O que você está vendo neste ponto?");
            if(desc) {
                // Captura a coordenada exata do centro onde a mira está parada
                const centro = map.getCenter();
                
                L.marker(centro).addTo(map).bindPopup(`<b>Registro:</b><br>${desc}`).openPopup();
                
                const item = document.createElement('div');
                item.style.cssText = "padding: 15px; border-bottom: 1px solid #333; background: #252525; margin-bottom: 8px; border-radius: 8px;";
                item.innerHTML = `<small style="color: #666;">Novo alerta:</small><br><strong>${desc}</strong>`;
                document.getElementById('lista').prepend(item);
            }
        }
    </script>
</body>
</html>
